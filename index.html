<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Home - Bootstrap</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="app.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom fixed-top">
  <div class="container-fluid px-5">
    
    <a class="navbar-brand logo" href="#">Instagram</a>

    <form class="d-none d-md-block">
      <input class="form-control" type="search" placeholder="Search">
    </form>

    <div class="d-flex fs-4 gap-3">
      <span>🏠</span>
      <span>💬</span>
      <span>➕</span>
      <span>❤️</span>
      <span>👤</span>
    </div>

  </div>
</nav>

<!-- Main Content -->
<div class="container main-content">
  <div class="row justify-content-center">
    <div class="col-lg-6">

      <!-- Stories -->
      <div class="card mb-4">
        <div class="card-body d-flex overflow-auto gap-3">

          <div class="text-center story">
            <img src="https://i.pravatar.cc/60?img=1">
            <p class="small mb-0">user1</p>
          </div>

          <div class="text-center story">
            <img src="https://i.pravatar.cc/60?img=2">
            <p class="small mb-0">user2</p>
          </div>

          <div class="text-center story">
            <img src="https://i.pravatar.cc/60?img=3">
            <p class="small mb-0">user3</p>
          </div>

          <div class="text-center story">
            <img src="https://i.pravatar.cc/60?img=4">
            <p class="small mb-0">user4</p>
          </div>

        </div>
      </div>

      <!-- Post 1 -->
      <div class="card mb-4">
        <div class="card-header bg-white d-flex align-items-center gap-2">
          <img src="https://i.pravatar.cc/40?img=5">
          <strong>user5</strong>
        </div>

        <img src="https://picsum.photos/600/400?random=1" class="img-fluid">

        <div class="card-body">
          <div class="fs-4 mb-2">
            ❤️ 💬 📤
          </div>
          <p class="mb-0"><strong>user5</strong> Beautiful day 🌞</p>
        </div>
      </div>

      <!-- Post 2 -->
      <div class="card mb-4">
        <div class="card-header bg-white d-flex align-items-center gap-2">
          <img src="https://i.pravatar.cc/40?img=6">
          <strong>user6</strong>
        </div>

        <img src="https://picsum.photos/600/400?random=2" class="img-fluid">

        <div class="card-body">
          <div class="fs-4 mb-2">
            ❤️ 💬 📤
          </div>
          <p class="mb-0"><strong>user6</strong> Enjoying the moment ✨</p>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
